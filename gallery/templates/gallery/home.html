{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  </head>
  <body>
    <h2>Home page</h2>
    <ul>
      {% for GalleryItem in object_list %}
      <h2>{{ GalleryItem.title }}</h2>
      <img src="{{ GalleryItem.picture.url }}" alt="{{ GalleryItem.title }}">
      <date>{{ GalleryItem.date }}</date>
      <p>{{ GalleryItem.description }}</p>
      {% endfor %}  
    </ul>  
</body>
</html>
